<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BTC vs ETH - Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #f7931a, #627eea);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      opacity: 0.8;
    }

    .players {
      display: flex;
      gap: 2rem;
      margin-bottom: 1rem;
    }

    .player {
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-weight: bold;
      opacity: 0.5;
      transition: all 0.3s;
    }

    .player.active {
      opacity: 1;
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }

    .player.bitcoin { background: rgba(247, 147, 26, 0.2); border: 2px solid #f7931a; }
    .player.bitcoin.active { background: rgba(247, 147, 26, 0.4); }

    .player.ethereum { background: rgba(98, 126, 234, 0.2); border: 2px solid #627eea; }
    .player.ethereum.active { background: rgba(98, 126, 234, 0.4); }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      background: rgba(255, 255, 255, 0.1);
      padding: 8px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    .cell {
      width: 100px;
      height: 100px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .cell:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: scale(1.05);
    }

    .cell.taken {
      cursor: not-allowed;
    }

    .cell.taken:hover {
      transform: none;
    }

    .cell svg {
      width: 60px;
      height: 60px;
    }

    .status {
      margin-top: 1.5rem;
      font-size: 1.3rem;
      text-align: center;
    }

    .status.win {
      color: #4ade80;
      font-weight: bold;
    }

    .status.draw {
      color: #fbbf24;
      font-weight: bold;
    }

    .reset-btn {
      margin-top: 1rem;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      background: linear-gradient(135deg, #f7931a, #627eea);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .reset-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(247, 147, 26, 0.4);
    }

    .connecting {
      color: #fbbf24;
    }

    .error {
      color: #ef4444;
    }
  </style>
</head>
<body>
  <h1>BTC vs ETH</h1>
  <p class="subtitle">Tic Tac Toe on the Internet Computer</p>

  <div class="players">
    <div class="player bitcoin" id="player-bitcoin">
      <span>Bitcoin's Turn</span>
    </div>
    <div class="player ethereum" id="player-ethereum">
      <span>Ethereum's Turn</span>
    </div>
  </div>

  <div class="board" id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <p class="status" id="status">Connecting to ICP...</p>
  <button class="reset-btn" id="reset" style="display: none;">New Game</button>

  <script src="bundle.js"></script>
</body>
</html>
