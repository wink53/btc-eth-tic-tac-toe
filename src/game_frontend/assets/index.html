<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BTC vs ETH Tic Tac Toe</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff}
    h1{font-size:2.5rem;background:linear-gradient(90deg,#f7931a,#627eea);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .subtitle{margin-bottom:1.5rem;opacity:.8}
    .top-bar{display:flex;align-items:center;gap:1rem;margin-bottom:.5rem}
    .mode-select{display:flex;gap:.5rem}
    .mode-btn{padding:.4rem .8rem;font-size:.8rem;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:#fff;border-radius:6px;cursor:pointer;transition:all .2s}
    .mode-btn:hover{border-color:rgba(255,255,255,.4)}
    .mode-btn.active{background:rgba(74,222,128,.2);border-color:#4ade80;color:#4ade80}
    .sound-btn{background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;padding:.4rem;opacity:.7;transition:opacity .2s}
    .sound-btn:hover{opacity:1}
    .sound-btn.muted{opacity:.3}
    .scores{display:flex;gap:1.5rem;margin-bottom:1rem;font-size:.9rem;opacity:.8}
    .scores span{margin-right:.5rem}
    .scores .btc-score{color:#f7931a}
    .scores .eth-score{color:#627eea}
    .scores .draws-score{color:#fbbf24}
    .players{display:flex;gap:2rem;margin-bottom:1rem}
    .player{padding:.5rem 1rem;border-radius:8px;font-weight:bold;opacity:.5;transition:all .3s}
    .player.active{opacity:1;transform:scale(1.1);box-shadow:0 0 20px rgba(255,255,255,.2)}
    .player.bitcoin{background:rgba(247,147,26,.2);border:2px solid #f7931a}
    .player.bitcoin.active{background:rgba(247,147,26,.4)}
    .player.ethereum{background:rgba(98,126,234,.2);border:2px solid #627eea}
    .player.ethereum.active{background:rgba(98,126,234,.4)}
    .board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:rgba(255,255,255,.1);padding:8px;border-radius:12px}
    .cell{width:100px;height:100px;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
    .cell:hover{background:rgba(255,255,255,.1);transform:scale(1.05)}
    .cell.taken{cursor:not-allowed}
    .cell.taken:hover{transform:none}
    .cell.disabled{cursor:not-allowed;opacity:.7}
    .cell.disabled:hover{transform:none}
    .cell svg{width:70px;height:70px;filter:drop-shadow(0 0 8px rgba(255,255,255,.3))}
    .cell.just-placed{animation:cellPop .4s ease-out}
    .cell.just-placed svg{animation:iconLand .6s cubic-bezier(.34,1.56,.64,1) forwards}
    @keyframes cellPop{0%{transform:scale(.85)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
    @keyframes iconLand{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0);opacity:1}}
    .cell.bitcoin.just-placed{box-shadow:0 0 25px 8px rgba(247,147,26,.7)}
    .cell.ethereum.just-placed{box-shadow:0 0 25px 8px rgba(98,126,234,.7)}
    .cell.winner{animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,.7)}50%{box-shadow:0 0 20px 10px rgba(74,222,128,.3)}}
    .cell.winner::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(74,222,128,.3),transparent);border-radius:6px}
    .status{margin-top:1.5rem;font-size:1.3rem}
    .status.win{color:#4ade80;font-weight:bold;animation:bounce 1s ease}
    .status.draw{color:#fbbf24;font-weight:bold}
    @keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-10px)}50%{transform:translateY(-5px)}}
    .banner{position:fixed;top:5%;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,rgba(0,0,0,.95),rgba(30,30,50,.95));border:3px solid #4ade80;border-radius:20px;padding:2rem 3rem;text-align:center;z-index:200;animation:popIn .5s ease forwards}
    @keyframes popIn{0%{transform:translateX(-50%) scale(0);opacity:0}70%{transform:translateX(-50%) scale(1.1);opacity:1}100%{transform:translateX(-50%) scale(1);opacity:1}}
    .banner h2{font-size:2rem;margin-bottom:.5rem}
    .banner.bitcoin h2{color:#f7931a}
    .banner.ethereum h2{color:#627eea}
    .banner.draw h2{color:#fbbf24}
    .banner p{opacity:.8}
    .banner .play-again{margin-top:1.5rem;padding:.75rem 2rem;font-size:1rem;background:linear-gradient(135deg,#4ade80,#22c55e);border:none;border-radius:8px;color:#fff;cursor:pointer;font-weight:bold;transition:transform .2s}
    .banner .play-again:hover{transform:scale(1.05)}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;opacity:0;animation:fadeIn .3s ease forwards}
    @keyframes fadeIn{to{opacity:1}}
    .reset-btn{margin-top:1rem;padding:.75rem 2rem;font-size:1rem;background:linear-gradient(135deg,#f7931a,#627eea);border:none;border-radius:8px;color:#fff;cursor:pointer;font-weight:bold;transition:transform .2s}
    .reset-btn:hover{transform:translateY(-2px)}
    #loading{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;font-size:1.5rem;z-index:100}
  </style>
<script defer src="bundle.c69c59e74153d7e18811.js"></script></head>
<body>
  <div id="loading">Loading ICP Agent...</div>
  <h1>BTC vs ETH</h1>
  <p class="subtitle">Tic Tac Toe on ICP</p>
  <div class="top-bar">
    <div class="mode-select">
      <button class="mode-btn active" data-mode="pvp">PvP</button>
      <button class="mode-btn" data-mode="btc_cpu">BTC vs CPU</button>
      <button class="mode-btn" data-mode="cpu_eth">CPU vs ETH</button>
    </div>
    <button class="sound-btn" id="soundBtn" title="Toggle sound">🔊</button>
  </div>
  <div class="scores">
    <span class="btc-score">BTC: <b id="btcScore">0</b></span>
    <span class="eth-score">ETH: <b id="ethScore">0</b></span>
    <span class="draws-score">Draws: <b id="drawScore">0</b></span>
  </div>
  <div class="players">
    <div class="player bitcoin" id="pb"><span>Bitcoin</span></div>
    <div class="player ethereum" id="pe"><span>Ethereum</span></div>
  </div>
  <div class="board" id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>
  <p class="status" id="status">Click to play</p>
  <button class="reset-btn" id="reset">New Game</button>
  <div class="overlay" id="overlay"></div>
  <div class="banner" id="banner">
    <h2 id="bannerTitle"></h2>
    <p id="bannerSubtitle"></p>
    <button class="play-again" id="playAgain">Play Again</button>
  </div>
</body>
</html>
